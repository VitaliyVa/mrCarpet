name: Deploy to Production

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'README*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.8.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
        
    - name: Add server to known hosts
      run: |
        ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
        
    - name: Deploy to server
      run: |
        ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
          set -e
          cd ~/projects/mrCarpet
          mkdir -p backups
          TS=$(date +%Y%m%d_%H%M%S)

          # IMPORTANT: SQLite lives inside the git worktree (bind mount).
          # Never let git pull overwrite db.sqlite3 / WAL / SHM.

          echo "Stopping web before DB backup + git pull..."
          docker compose -f docker-compose.prod.yml stop web || true

          echo "Checkpointing WAL into db.sqlite3, then backing up..."
          if [ -f db.sqlite3 ]; then
            # Merge WAL into main file so a single-file copy is consistent.
            if command -v sqlite3 >/dev/null 2>&1; then
              sqlite3 db.sqlite3 "PRAGMA wal_checkpoint(TRUNCATE);" || true
            else
              docker compose -f docker-compose.prod.yml run --rm --no-deps web \
                python -c "import sqlite3; c=sqlite3.connect('/app/db.sqlite3'); c.execute('PRAGMA wal_checkpoint(TRUNCATE)'); c.close()" \
                || true
            fi
            # db.sqlite3 may be root-owned; use docker for reliable copy.
            docker run --rm -v "$PWD":/app -v /tmp:/tmp alpine:latest \
              sh -c "cp /app/db.sqlite3 /app/backups/db.sqlite3.pre_deploy_${TS} && cp /app/db.sqlite3 /tmp/mrcarpet_db_live_${TS}.sqlite3 && chmod 644 /app/backups/db.sqlite3.pre_deploy_${TS} /tmp/mrcarpet_db_live_${TS}.sqlite3"
          fi

          # Untracked files on the server must not block git pull.
          echo "Clearing untracked conflicts that would block merge..."
          git fetch origin
          git clean -fd -- scripts || true

          echo "Pulling latest changes..."
          git pull origin main

          echo "Restoring live SQLite (git must not own prod data)..."
          if [ -f "/tmp/mrcarpet_db_live_${TS}.sqlite3" ]; then
            docker run --rm -v "$PWD":/app -v /tmp:/tmp alpine:latest \
              sh -c "cp /tmp/mrcarpet_db_live_${TS}.sqlite3 /app/db.sqlite3 && chmod 666 /app/db.sqlite3 && rm -f /app/db.sqlite3-wal /app/db.sqlite3-shm"
          else
            rm -f db.sqlite3-wal db.sqlite3-shm
          fi

          echo "Rebuilding containers..."
          docker compose -f docker-compose.prod.yml build web

          echo "Starting containers..."
          docker compose -f docker-compose.prod.yml up -d

          echo "Waiting for web container to be ready..."
          sleep 10

          echo "Collecting static files..."
          docker compose -f docker-compose.prod.yml exec -T web python manage.py collectstatic --noinput || true

          echo "Running migrations..."
          docker compose -f docker-compose.prod.yml exec -T web python manage.py migrate --noinput || true

          echo "Restarting services..."
          docker compose -f docker-compose.prod.yml restart web nginx

          echo "Cleaning up Docker..."
          docker system prune -f

          echo "Deployment completed successfully!"
        EOF
        
    - name: Deployment status
      run: |
        echo "✅ Deployment completed successfully!"
