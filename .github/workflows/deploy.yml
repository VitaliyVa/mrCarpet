name: Deploy to Production

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'README*'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.8.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Add server to known hosts
      run: |
        ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

    - name: Deploy to server
      run: |
        ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
        set -e
        cd ~/projects/mrCarpet
        mkdir -p backups
        TS=$(date +%Y%m%d_%H%M%S)

        # --- Housekeeping ПЕРЕД деплоєм ---------------------------------
        # Свідомо на початку, а не в кінці: якщо деплой упаде на healthcheck,
        # прибирання все одно відбудеться. Саме через "очищення в кінці"
        # одного разу набігло 44 ГБ build cache і диск заповнився на 76%.
        echo "Housekeeping: rotating DB backups (keep 10 newest + oldest anchor)..."
        # subshell: жоден збій усередині не змінить робочу директорію деплою
        (
          cd backups || exit 0
          OLDEST=$(ls -1t db.sqlite3.* 2>/dev/null | tail -1)
          ls -1t db.sqlite3.* 2>/dev/null | tail -n +11 \
            | grep -v "^${OLDEST}$" | xargs -r rm -f
        ) || true
        # /tmp-копії БД належать root (їх пише alpine-контейнер) — чистимо ним же
        docker run --rm -v /tmp:/hosttmp alpine:latest sh -c \
          'cd /hosttmp && ls -1t mrcarpet_db_live_*.sqlite3 2>/dev/null | tail -n +4 | xargs -r rm -f' \
          || true
        echo "Housekeeping: pruning docker build cache older than 48h..."
        docker builder prune -f --filter until=48h || true
        df -h / | tail -1

        # IMPORTANT: SQLite lives inside the git worktree (bind mount).
        # Never let git pull overwrite db.sqlite3 / WAL / SHM.

        echo "Stopping web before DB backup + git pull..."
        docker compose -f docker-compose.prod.yml stop web || true

        echo "Checkpointing WAL into db.sqlite3, then backing up..."
        if [ -f db.sqlite3 ]; then
          if command -v sqlite3 >/dev/null 2>&1; then
            sqlite3 db.sqlite3 "PRAGMA wal_checkpoint(TRUNCATE);" || true
          else
            docker compose -f docker-compose.prod.yml run --rm --no-deps web \
              python -c "import sqlite3; c=sqlite3.connect('/app/db.sqlite3'); c.execute('PRAGMA wal_checkpoint(TRUNCATE)'); c.close()" \
              || true
          fi
          docker run --rm -v "$PWD":/app -v /tmp:/tmp alpine:latest \
            sh -c "cp /app/db.sqlite3 /app/backups/db.sqlite3.pre_deploy_${TS} && cp /app/db.sqlite3 /tmp/mrcarpet_db_live_${TS}.sqlite3 && chmod 644 /app/backups/db.sqlite3.pre_deploy_${TS} /tmp/mrcarpet_db_live_${TS}.sqlite3"
        fi

        echo "Resetting tracked worktree drift so git pull cannot abort..."
        # DB/backups are untracked — safe. Never commit them.
        git fetch origin
        git checkout -- . || true
        git clean -fd -- scripts || true

        # scp/manual leftovers: untracked files that already exist in origin/main
        # block `git pull` ("would be overwritten by merge"). Remove only those.
        echo "Clearing untracked paths that would block merge from origin/main..."
        git ls-tree -r --name-only origin/main | while IFS= read -r path; do
          [ -e "$path" ] || continue
          if git ls-files --error-unmatch -- "$path" >/dev/null 2>&1; then
            continue
          fi
          case "$path" in
            db.sqlite3|db.sqlite3-wal|db.sqlite3-shm) continue ;;
          esac
          rm -rf -- "$path"
        done

        echo "Pulling latest changes..."
        git pull origin main

        echo "Restoring live SQLite (git must not own prod data)..."
        if [ -f "/tmp/mrcarpet_db_live_${TS}.sqlite3" ]; then
          docker run --rm -v "$PWD":/app -v /tmp:/tmp alpine:latest \
            sh -c "cp /tmp/mrcarpet_db_live_${TS}.sqlite3 /app/db.sqlite3 && chmod 666 /app/db.sqlite3 && rm -f /app/db.sqlite3-wal /app/db.sqlite3-shm"
        else
          rm -f db.sqlite3-wal db.sqlite3-shm
        fi

        echo "Rebuilding containers..."
        docker compose -f docker-compose.prod.yml build web

        echo "Starting web first..."
        docker compose -f docker-compose.prod.yml up -d web

        # Фонові сервіси піднімаємо ДО healthcheck: якщо перевірка нижче
        # впаде і скрипт вийде з exit 1, планувальник тижневого звіту
        # (ga4-weekly) все одно лишиться живим. Саме через зворотний
        # порядок він одного разу зник і звіт у понеділок не прийшов.
        echo "Starting background services (independent of healthcheck)..."
        docker compose -f docker-compose.prod.yml up -d ga4-weekly

        echo "Waiting until gunicorn answers inside web..."
        # Host header обов'язковий: ALLOWED_HOSTS строгий, голий 127.0.0.1 дав би 400
        for i in $(seq 1 30); do
          if docker compose -f docker-compose.prod.yml exec -T web \
            python -c "import urllib.request; urllib.request.urlopen(urllib.request.Request('http://127.0.0.1:8000/', headers={'Host': 'mrcarpet24.com'}), timeout=2)" \
            >/dev/null 2>&1; then
            echo "web ready (attempt $i)"
            break
          fi
          sleep 2
          if [ "$i" -eq 30 ]; then
            echo "web failed to become ready"
            docker compose -f docker-compose.prod.yml logs web --tail 80
            exit 1
          fi
        done

        echo "Starting remaining services..."
        docker compose -f docker-compose.prod.yml up -d

        echo "Collecting static files..."
        docker compose -f docker-compose.prod.yml exec -T web python manage.py collectstatic --noinput || true

        echo "Running migrations..."
        docker compose -f docker-compose.prod.yml exec -T web python manage.py migrate --noinput || true

        echo "Reloading nginx..."
        docker compose -f docker-compose.prod.yml up -d nginx
        docker compose -f docker-compose.prod.yml exec -T nginx nginx -s reload \
          || docker compose -f docker-compose.prod.yml restart nginx

        echo "Healthcheck via public HTTPS (must be 200)..."
        OK=0
        for i in $(seq 1 12); do
          CODE=$(python3 -c 'import urllib.request; print(urllib.request.urlopen("https://mrcarpet24.com/", timeout=10).status)' 2>/dev/null || echo 000)
          echo "health attempt $i -> HTTP $CODE"
          if [ "$CODE" = "200" ]; then
            OK=1
            break
          fi
          docker compose -f docker-compose.prod.yml restart nginx
          sleep 3
        done
        if [ "$OK" != "1" ]; then
          echo "Deploy healthcheck failed - site not returning 200"
          docker compose -f docker-compose.prod.yml ps
          docker compose -f docker-compose.prod.yml logs web --tail 50
          docker compose -f docker-compose.prod.yml logs nginx --tail 50
          exit 1
        fi

        echo "Final state:"
        docker compose -f docker-compose.prod.yml ps

        echo "Cleaning up Docker images..."
        # ВАЖЛИВО: тільки образи. `docker system prune` видаляє ще й зупинені
        # контейнери — так одного разу зник ga4-weekly і тижневий звіт не прийшов.
        # Build cache чиститься на початку деплою (див. Housekeeping).
        docker image prune -f
        df -h / | tail -1

        echo "Deployment completed successfully!"
        EOF

    - name: Deployment status
      run: echo "Deployment completed successfully!"
