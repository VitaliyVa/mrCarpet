<style>
  .liqpay-page {
    position: relative;
    min-height: 70vh;
    padding: 24px 16px 48px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #liqpay_checkout {
    position: relative;
    top: 60px;
    width: 100%;
    max-width: 720px;
    min-height: 420px;
    opacity: 0;
    transition: opacity 0.25s ease;
  }

  #liqpay_checkout.is-ready {
    opacity: 1;
  }

  .liqpay-page__loader {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    text-align: center;
    color: #5a4a3a;
  }

  .liqpay-page__loader.is-hidden {
    display: none;
  }

  .liqpay-page__loader-spinner {
    width: 48px;
    height: 48px;
    border: 4px solid #f0e6d8;
    border-top-color: #a46c46;
    border-radius: 50%;
    animation: liqpay-spin 0.8s linear infinite;
  }

  .liqpay-page__loader-text {
    font-size: 15px;
    line-height: 1.4;
  }

  @keyframes liqpay-spin {
    to {
      transform: rotate(360deg);
    }
  }

  #liqpay_error {
    display: none;
    position: relative;
    top: 60px;
    width: 100%;
    max-width: 720px;
    color: #842029;
    padding: 20px;
    background: #f8d7da;
    border: 1px solid #f5c6cb;
    border-radius: 4px;
    margin: 20px 0 0;
  }
</style>

<section class="liqpay-page" aria-busy="true">
  <div class="liqpay-page__loader" id="liqpay_loader">
    <div class="liqpay-page__loader-spinner" aria-hidden="true"></div>
    <p class="liqpay-page__loader-text">Завантаження оплати…</p>
  </div>
  <div id="liqpay_checkout"></div>
  <div id="liqpay_error" role="alert"></div>
</section>

<script>
    window.LiqPayCheckoutCallback = function() {
        var loader = document.getElementById("liqpay_loader");
        var checkout = document.getElementById("liqpay_checkout");
        var errorEl = document.getElementById("liqpay_error");
        var page = document.querySelector(".liqpay-page");

        function hideLoader() {
            if (loader) loader.classList.add("is-hidden");
            if (page) page.setAttribute("aria-busy", "false");
        }

        function showCheckout() {
            hideLoader();
            if (checkout) checkout.classList.add("is-ready");
        }

        function showError(message) {
            hideLoader();
            if (errorEl) {
                errorEl.style.display = "block";
                errorEl.textContent = message;
            }
        }

        console.log("[LiqPay] Ініціалізація платежу...");
        console.log("[LiqPay] Data:", "{{ data|slice:':50' }}...");
        console.log("[LiqPay] Signature:", "{{ signature|slice:':20' }}...");

        try {
            LiqPayCheckout.init({
                data: "{{ data }}",
                signature: "{{ signature }}",
                embedTo: "#liqpay_checkout",
                mode: "embed"
            }).on("liqpay.callback", function(data){
                console.log("[LiqPay] Callback отримано:", data);
                console.log("[LiqPay] Status:", data.status);

                if (data.status === "success" || data.status === "sandbox") {
                    console.log("[LiqPay] Оплата успішна, перенаправляємо...");
                    window.location.href = "/success/";
                } else if (data.status === "failure") {
                    console.error("[LiqPay] Оплата не вдалася:", data);
                    showError("Помилка при проведенні транзакції: " + (data.err_description || "Невідома помилка"));
                }
            }).on("liqpay.ready", function(data){
                console.log("[LiqPay] Ready:", data);
                showCheckout();
            }).on("liqpay.close", function(data){
                console.log("[LiqPay] Close:", data);
            }).on("liqpay.error", function(data){
                console.error("[LiqPay] Error:", data);
                showError("Помилка LiqPay: " + (data.message || JSON.stringify(data)));
            });

            // Fallback якщо ready не прийде
            setTimeout(function() {
                if (checkout && !checkout.classList.contains("is-ready") && errorEl && errorEl.style.display !== "block") {
                    showCheckout();
                }
            }, 8000);
        } catch (error) {
            console.error("[LiqPay] Помилка ініціалізації:", error);
            showError("Помилка ініціалізації платежу: " + error.message);
        }

        // Страховка від зависання віджета: якщо покупець закрив вікно 3D Secure
        // вручну, LiqPay не присилає liqpay.callback і сторінка висить на «Apply».
        // Тому питаємо власний бекенд — webhook там уже відпрацював.
        (function pollOwnStatus() {
            var POLL_MS = 4000;
            var MAX_MS = 15 * 60 * 1000;
            var startedAt = Date.now();
            var redirecting = false;
            var timer = null;

            function stop() {
                if (timer) clearInterval(timer);
                timer = null;
            }

            function check() {
                if (redirecting) return;
                if (Date.now() - startedAt > MAX_MS) {
                    stop();
                    return;
                }
                fetch("/api/payment-status/", {
                    credentials: "same-origin",
                    headers: { "Accept": "application/json" }
                })
                    .then(function (res) { return res.ok ? res.json() : null; })
                    .then(function (data) {
                        if (!data || !data.paid || redirecting) return;
                        redirecting = true;
                        stop();
                        console.log("[LiqPay] Оплата підтверджена бекендом — перехід на /success/");
                        window.location.href = "/success/";
                    })
                    .catch(function () { /* мережа моргнула — спробуємо на наступному тику */ });
            }

            timer = setInterval(check, POLL_MS);
            // Повернувся на вкладку після 3DS — перевіряємо негайно
            document.addEventListener("visibilitychange", function () {
                if (!document.hidden) check();
            });
            window.addEventListener("focus", check);
        })();
    };
</script>
<script src="//static.liqpay.ua/libjs/checkout.js" async></script>
