<footer
      class="footer"
      style="background-image: url(/static/utils/assets/footer/mr.Carpet.png)"
    >
      <div class="container">
        <div class="footer__wrapper">
          <form
            id="newsletter-subscribe"
            class="footer_form subscription-form font-size-18 validation__block"
          >
            <div class="footer_form_title medium color_black">
              Розсилка новин та акцій
            </div>
            <div class="footer_form_text color_black_sub">
              Акції, розпродажі та промокод на <strong>−5%</strong> для
              першого замовлення — підпишіться на розсилку
            </div>
            <div class="footer_form_input validation_container">
              <input
                class="input-transparent validation_input"
                type="email"
                name="email"
                data-type="email"
                placeholder="Поле пошти"
              />
            </div>

            <div class="validation_container">
              <input id="accept" class="validation_input" name="accept" type="checkbox" data-type="checkbox" value="accept" />
              <label for="accept">
                <span class="accept"
                  >Приймаю
                  <a href="{% url 'policy' %}" class="color_gold" target="_blank" rel="noopener"
                    >умови розсилки</a
                  ></span
                >
              </label>
            </div>

            <button
              type="submit"
              class="info_for_product_btn subscription-form__subscribe-btn subscribe-btn medium color_gold validation_btn">
              Підписатися на розсилку
            </button>
          </form>

          <div class="footer__right font-size-18">
            <div class="footer__column">
              <div class="footer__links" style="align-items: flex-end; text-align: right">
                <div class="footer_form_title medium color_black">
                  Для покупця
                </div>
                <a href="{% url 'about' %}"> Про компанію </a>
                <a href="{% url 'blog' %}"> Блог </a>
                <button class="modal_open" data-href="contacts-modal" style="text-align: right">
                  Контакти
                </button>
              </div>

              <div style="display: flex; align-items: center; gap: 18px; flex-wrap: wrap">
                <a href="{% url 'index' %}" class="color_black_sub flex">
                  <img src="/static/utils/assets/LogoBlack.svg" alt="" width="40" height="34" aria-hidden="true" />
                  <span>© 2026 Mr.Carpet</span>
                </a>
                <a href="#" class="flex">
                  <img src="/static/utils/assets/footer/visa.svg" alt="Visa" width="48" height="32" />
                </a>
                <a href="#" class="flex">
                  <img
                    src="/static/utils/assets/footer/mastercard.svg"
                    alt="Mastercard"
                    width="48"
                    height="32"
                  />
                </a>
              </div>
            </div>
            <div class="footer__column">
              <div class="footer__links">
                <div class="footer_form_title medium color_black">
                  Інтернет-магазин
                </div>
                <a href="{% url 'delivery' %}"> Доставка і оплата </a>
                <a href="{% url 'refund' %}"> Повернення </a>
                <a href="{% url 'terms' %}"> Умови і положення </a>
                <a href="{% url 'policy' %}"> Політика конфіденційності </a>
              </div>

              <div class="flex">
                {% include 'includes/social_links.html' %}
              </div>
            </div>
          </div>
        </div>
      </div>
    </footer>
