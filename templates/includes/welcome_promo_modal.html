<div class="modal-overlay welcome-promo-overlay">
  <div
    class="welcome-promo-modal modal__block"
    role="dialog"
    aria-modal="true"
    aria-labelledby="welcome-promo-title"
  >
    <button
      type="button"
      class="welcome-promo-modal__close modal_close"
      aria-label="Закрити"
    >
      ×
    </button>
    <div class="welcome-promo-modal__eyebrow">Дякуємо за підписку</div>
    <h3 id="welcome-promo-title" class="welcome-promo-modal__title">
      Ваш промокод на перше замовлення
    </h3>
    <p class="welcome-promo-modal__text">
      Знижка <strong>−5%</strong>. Введіть код у кошику при оформленні.
    </p>
    <div class="welcome-promo-modal__code-row">
      <code class="welcome-promo-modal__code" data-welcome-promo-code
        >WELCOME5</code
      >
      <button
        type="button"
        class="welcome-promo-modal__copy btn-gold"
        data-welcome-promo-copy
      >
        Скопіювати
      </button>
    </div>
    <p class="welcome-promo-modal__hint" data-welcome-promo-hint hidden>
      Скопійовано
    </p>
  </div>
</div>
