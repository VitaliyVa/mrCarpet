<section class="catalog_items">
  <div class="container">
    <div class="catalog_item__block">
      <a href="{% url 'all_collection' %}" class="catalog_item hvr-curl-bottom-left">
        <span class="catalog_item_text small color_black">Вся колекція</span>
        <span class="catalog_item_img">
          <img
            src="/static/utils/assets/catalog_item/catalog_item-1.png"
            alt="Вся колекція"
            width="280"
            height="280"
            loading="lazy"
            decoding="async"
          />
        </span>
      </a>
      {% for category in categories %}
      <a href="{{ category.get_absolute_url }}" class="catalog_item hvr-curl-bottom-left">
        <span class="catalog_item_text small color_black"
          >{{ category.title }}</span
        >
        <span class="catalog_item_img">
          <img
            src="{% if category.image %}{{ category.image.url }}{% else %}/static/utils/assets/catalog_item/catalog_item-1.png{% endif %}"
            alt="{{ category.title }}"
            width="280"
            height="280"
            loading="lazy"
            decoding="async"
          />
        </span>
      </a>
      {% endfor %}
    </div>
  </div>
  <!-- /.container -->
</section>
