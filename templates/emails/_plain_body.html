<table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
  <tr>
    <td style="padding:32px 28px 12px;">
      {% if title %}
      <h1 style="margin:0 0 16px;font-size:22px;line-height:1.3;color:#453f3a;font-weight:700;font-family:Arial,Helvetica,sans-serif;">
        {{ title }}
      </h1>
      {% endif %}
      <div style="font-size:15px;line-height:1.6;color:#5c554f;font-family:Arial,Helvetica,sans-serif;">
        {{ body_html|safe }}
      </div>
    </td>
  </tr>
  <tr>
    <td style="padding:8px 28px 32px;">
      <p style="margin:0;font-size:13px;line-height:1.5;color:#89817c;font-family:Arial,Helvetica,sans-serif;">
        Якщо маєте питання — відповідайте на цей лист або пишіть на
        <a href="mailto:{{ support_email }}" style="color:#a46c46;text-decoration:underline;">{{ support_email }}</a>.
      </p>
    </td>
  </tr>
</table>
