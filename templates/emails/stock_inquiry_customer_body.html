<table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
  <tr>
    <td style="padding:32px 28px 8px;">
      <h1 style="margin:0 0 14px;font-size:22px;line-height:1.25;color:#453f3a;font-weight:700;font-family:Arial,Helvetica,sans-serif;">
        Дякуємо, {{ name }}!
      </h1>
      <p style="margin:0 0 18px;font-size:15px;line-height:1.55;color:#5c554f;font-family:Arial,Helvetica,sans-serif;">
        Ми отримали ваш запит. Менеджер уточнить наявність і зв’яжеться з вами найближчим часом.
      </p>
    </td>
  </tr>
  <tr>
    <td style="padding:0 28px 28px;">
      <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:#ffffff;border:1px solid #efe6dc;">
        <tr>
          <td style="padding:18px 20px;">
            <div style="font-size:11px;line-height:1.3;color:#89817c;text-transform:uppercase;letter-spacing:0.05em;font-family:Arial,Helvetica,sans-serif;margin-bottom:8px;">Товар</div>
            <div style="font-size:16px;line-height:1.4;color:#453f3a;font-weight:700;font-family:Arial,Helvetica,sans-serif;">{{ product_title }}</div>
            <div style="height:1px;background-color:#efe6dc;margin:16px 0;line-height:1px;font-size:1px;">&nbsp;</div>
            <div style="font-size:11px;line-height:1.3;color:#89817c;text-transform:uppercase;letter-spacing:0.05em;font-family:Arial,Helvetica,sans-serif;margin-bottom:8px;">Розмір</div>
            <div style="font-size:16px;line-height:1.4;color:#a46c46;font-weight:700;font-family:Arial,Helvetica,sans-serif;">{{ size_label }}</div>
          </td>
        </tr>
      </table>
    </td>
  </tr>
  <tr>
    <td style="padding:0 28px 28px;">
      <p style="margin:0;font-size:14px;line-height:1.5;color:#89817c;font-family:Arial,Helvetica,sans-serif;">
        Якщо у вас є уточнення — просто відповідайте на цей лист.
      </p>
    </td>
  </tr>
</table>
