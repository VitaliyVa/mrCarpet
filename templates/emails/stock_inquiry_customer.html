<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Запит про наявність — mr.Carpet</title>
</head>
<body style="margin:0;padding:0;background:#f3efe8;font-family:Arial,Helvetica,sans-serif;-webkit-text-size-adjust:100%;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background:#f3efe8;padding:32px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="max-width:560px;background:#fffcf2;border-radius:12px;overflow:hidden;border:1px solid #efe6dc;">
          <tr>
            <td style="background:#a46c46;padding:22px 28px;text-align:center;">
              <div style="font-size:22px;line-height:1.2;font-weight:700;color:#fffcf2;letter-spacing:0.02em;">
                mr.Carpet
              </div>
              <div style="margin-top:6px;font-size:13px;line-height:1.3;color:rgba(255,252,242,0.88);">
                Запит про наявність
              </div>
            </td>
          </tr>
          <tr>
            <td style="padding:32px 28px 8px;">
              <h1 style="margin:0 0 14px;font-size:22px;line-height:1.25;color:#453f3a;font-weight:700;">
                Дякуємо, {{ name }}!
              </h1>
              <p style="margin:0 0 18px;font-size:15px;line-height:1.55;color:#5c554f;">
                Ми отримали ваш запит. Менеджер уточнить наявність і зв’яжеться з вами найближчим часом.
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:0 28px 28px;">
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background:#fff;border:1px solid #efe6dc;border-radius:10px;">
                <tr>
                  <td style="padding:18px 20px;">
                    <div style="font-size:12px;line-height:1.3;color:#89817c;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:8px;">
                      Товар
                    </div>
                    <div style="font-size:16px;line-height:1.4;color:#453f3a;font-weight:700;">
                      {{ product_title }}
                    </div>
                    <div style="height:1px;background:#efe6dc;margin:16px 0;"></div>
                    <div style="font-size:12px;line-height:1.3;color:#89817c;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:8px;">
                      Розмір
                    </div>
                    <div style="font-size:16px;line-height:1.4;color:#a46c46;font-weight:700;">
                      {{ size_label }}
                    </div>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td style="padding:0 28px 28px;">
              <p style="margin:0;font-size:14px;line-height:1.5;color:#89817c;">
                Якщо у вас є уточнення — просто відповідайте на цей лист.
              </p>
            </td>
          </tr>
          <tr>
            <td style="background:#453f3a;padding:18px 28px;text-align:center;">
              <div style="font-size:13px;line-height:1.4;color:#fffcf2;">
                З повагою, команда mr.Carpet
              </div>
              <div style="margin-top:6px;font-size:12px;line-height:1.4;color:rgba(255,252,242,0.7);">
                mrcarpet24.com
              </div>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
