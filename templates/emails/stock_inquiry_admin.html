<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Новий запит про наявність</title>
</head>
<body style="margin:0;padding:0;background:#f3efe8;font-family:Arial,Helvetica,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background:#f3efe8;padding:28px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="max-width:560px;background:#fffcf2;border-radius:12px;overflow:hidden;border:1px solid #efe6dc;">
          <tr>
            <td style="background:#a46c46;padding:18px 24px;">
              <div style="font-size:18px;font-weight:700;color:#fffcf2;">Новий запит про наявність</div>
            </td>
          </tr>
          <tr>
            <td style="padding:24px;">
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="font-size:14px;line-height:1.5;color:#453f3a;">
                <tr>
                  <td style="padding:8px 0;width:120px;color:#89817c;">Імʼя</td>
                  <td style="padding:8px 0;font-weight:700;">{{ name }}</td>
                </tr>
                <tr>
                  <td style="padding:8px 0;color:#89817c;">Телефон</td>
                  <td style="padding:8px 0;">{{ phone }}</td>
                </tr>
                <tr>
                  <td style="padding:8px 0;color:#89817c;">Email</td>
                  <td style="padding:8px 0;"><a href="mailto:{{ email }}" style="color:#a46c46;text-decoration:none;">{{ email }}</a></td>
                </tr>
                <tr>
                  <td style="padding:8px 0;color:#89817c;">Товар</td>
                  <td style="padding:8px 0;font-weight:700;">{{ product_title }}</td>
                </tr>
                <tr>
                  <td style="padding:8px 0;color:#89817c;">Розмір</td>
                  <td style="padding:8px 0;color:#a46c46;font-weight:700;">{{ size_label }}</td>
                </tr>
                <tr>
                  <td style="padding:8px 0;color:#89817c;">ID варіації</td>
                  <td style="padding:8px 0;">{{ product_attr_id }}</td>
                </tr>
              </table>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
