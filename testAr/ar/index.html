<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AR Килим — вибір і перегляд</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #11121a; color: #eee; }
    header { padding: 14px 18px 8px; }
    header h1 { font-size: 1.1rem; }
    header p { color: #888; font-size: 0.82rem; margin-top: 3px; }

    /* селектор килимів */
    #picker {
      display: flex; gap: 10px; padding: 12px 16px; overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .chip {
      flex: 0 0 auto; width: 92px; border: 2px solid transparent; border-radius: 12px;
      background: #1c1d2a; padding: 6px; cursor: pointer; text-align: center;
      transition: border-color .15s;
    }
    .chip.active { border-color: #007AFF; }
    .chip img {
      width: 100%; height: 64px; object-fit: contain; border-radius: 8px;
      background:
        linear-gradient(45deg,#2a2b3a 25%,transparent 25%,transparent 75%,#2a2b3a 75%) 0 0/16px 16px,
        linear-gradient(45deg,#2a2b3a 25%,#222 25%,#222 75%,#2a2b3a 75%) 8px 8px/16px 16px;
    }
    .chip span { display: block; font-size: 0.72rem; color: #bcd; margin-top: 5px; line-height: 1.2; }
    .chip small { display: block; font-size: 0.65rem; color: #777; }

    .mv-wrap { position: relative; }
    model-viewer { width: 100%; height: 58vh; background: #1c1d2a; --poster-color: #1c1d2a; }

    #ar-button {
      position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%);
      padding: 13px 26px; border: none; border-radius: 28px;
      background: #007AFF; color: #fff; font-size: 15px; font-weight: 700;
      box-shadow: 0 6px 20px rgba(0,0,0,0.4); cursor: pointer;
    }

    .note { padding: 12px 18px; color: #9aa; font-size: 0.82rem; line-height: 1.5; }
    .note b { color: #cde; }
  </style>
  <script type="module"
    src="https://unpkg.com/@google/model-viewer@4.0.0/dist/model-viewer.min.js"></script>
</head>
<body>
  <header>
    <h1>AR Килим</h1>
    <p>Обери килим зверху → «Переглянути в AR» → наведи на підлогу.</p>
  </header>

  <!-- селектор -->
  <div id="picker"></div>

  <div class="mv-wrap">
    <model-viewer
      id="mv"
      alt="3D килим"
      ar
      ar-modes="webxr scene-viewer quick-look"
      ar-placement="floor"
      ar-scale="fixed"
      camera-controls
      touch-action="pan-y"
      shadow-intensity="1"
      exposure="1"
    >
      <button id="ar-button" slot="ar-button">📱 Переглянути в AR</button>
    </model-viewer>
  </div>

  <div class="note">
    <p><b>Як тестувати:</b> тапни мініатюру → у 3D зміниться килим → «Переглянути в AR» → дозволь камеру → наведи на підлогу → тапни, щоб поставити → рухай/обертай пальцем.</p>
    <p style="margin-top:6px;"><b>Десктоп:</b> AR-кнопки нема, лише 3D-обертання мишкою — це нормально.</p>
  </div>

  <script type="module">
    // Список доступних килимів. thumb — мініатюра (з кореня сервера).
    const CARPETS = [
      { id: 'carpet',       name: 'Прямокутний', size: '1.0×2.0 м', glb: 'carpet.glb',       thumb: '/test.jpg' },
      { id: 'carpet1',      name: 'Килим 1',     size: '1.5×1.0 м', glb: 'carpet1.glb',      thumb: '/1.png' },
      { id: 'carpet-round', name: 'Круглий',     size: '1.4×1.4 м', glb: 'carpet-round.glb', thumb: '/sample-round.png' },
    ];

    const mv = document.getElementById('mv');
    const picker = document.getElementById('picker');

    function select(c, chipEl) {
      mv.src = c.glb;
      mv.alt = c.name;
      [...picker.children].forEach(el => el.classList.toggle('active', el === chipEl));
    }

    CARPETS.forEach((c, i) => {
      const chip = document.createElement('div');
      chip.className = 'chip' + (i === 0 ? ' active' : '');
      chip.innerHTML = `<img src="${c.thumb}" alt="${c.name}"><span>${c.name}<small>${c.size}</small></span>`;
      chip.addEventListener('click', () => select(c, chip));
      picker.appendChild(chip);
    });

    // початковий килим
    mv.src = CARPETS[0].glb;
    mv.alt = CARPETS[0].name;

    mv.addEventListener('ar-status', (e) => {
      console.log('ar-status:', e.detail.status);
      if (e.detail.status === 'failed') {
        alert('AR не вдалося запустити. Перевір: HTTPS, ARCore (Android) / ARKit (iOS).');
      }
    });
  </script>
</body>
</html>
